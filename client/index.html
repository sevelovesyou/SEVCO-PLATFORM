    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #app-loading.loaded {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-loading img {
        width: 160px;
        height: auto;
        animation: splash-pulse 1.8s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.96); }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <img src="/logo-splash.png" alt="SEVCO" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
